defaults:
  - env/roboeval_liftpot_state@env.train
  - env/roboeval_liftpot_state@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "roboeval_liftpot_sac_mlp"
    logger_backends: ["tensorboard"]

  max_epochs: 8000
  max_steps: -1

  only_eval: False
  val_check_interval: 200
  save_interval: 400

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 32
  use_fixed_reset_state_ids: False
  group_size: 1
  agg_q: min

  rollout_epoch: 1
  eval_rollout_epoch: 1

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  bootstrap_type: always
  gamma: 0.99
  tau: 0.005

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: -16  # -action_dim (16 DOF bimanual Panda)
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  # Replay buffer settings
  replay_buffer:
    enable_cache: True
    cache_size: 10000
    sample_window_size: 10000
    min_buffer_size: 0
    auto_save: False

  target_update_freq: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 1
    max_length: 1
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 32
    group_size: ${algorithm.group_size}
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 2

    use_rel_reward: False
    reward_coef: 1.0
    is_eval: False

    # Action smoothness penalty
    w_action_rate: 0.1

    video_cfg:
      save_video: False
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/train
      video_record_interval: 10

  eval:
    total_num_envs: 16
    group_size: ${algorithm.group_size}
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    use_fixed_reset_state_ids: True

    use_rel_reward: False
    reward_coef: 1.0
    is_eval: True

    w_action_rate: 0.1

    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
      video_record_interval: 1

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: ""
    precision: ${actor.model.precision}

  enable_torch_compile: True
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 1024
  global_batch_size: 1024
  seed: 1234
  enable_offload: False

  model:
    model_type: mlp_policy
    model_path: ""
    policy_setup: panda-qpos
    obs_dim: 38
    action_dim: 16
    num_action_chunks: 1
    hidden_dim: 256
    precision: "32"
    add_value_head: False
    add_q_head: True
    q_head_type: default
    is_lora: false
    lora_rank: 32

  optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: false
    cpu_offload: false
    offload_pin_memory: false
    reshard_after_forward: true
    enable_gradient_accumulation: true
    forward_prefetch: false
    limit_all_gathers: false
    backward_prefetch: null
    use_orig_params: false
    use_liger_kernel: false
    fsdp_size: -1

    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

    amp_autocast:
      enabled: false
      precision: "bf16"

    grad_scaler:
      enabled: false

reward:
  use_reward_model: False

critic:
  use_critic_model: False
