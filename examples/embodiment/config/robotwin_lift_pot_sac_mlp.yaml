# B2: MLP-SAC (from scratch) on RoboTwin lift_pot, default reward.
# State obs = proprioception (14) + pot pose (7) = 21 dims.

defaults:
  - env/robotwin_lift_pot_state@env.train
  - env/robotwin_lift_pot_state@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    # Same 2-GPU split as M1/B1 for Ray-group stability.
    actor: 0
    env: 0
    rollout: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "b2_mlp_sac_robotwin"
    logger_backends: ["tensorboard"]
  max_epochs: 2000
  max_steps: -1
  only_eval: False
  val_check_interval: 50
  save_interval: 100
  seq_length: 1
  max_prompt_length: 1
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 32
  use_fixed_reset_state_ids: False
  group_size: 1
  agg_q: min

  rollout_epoch: 1
  eval_rollout_epoch: 1

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "mean"

  bootstrap_type: always
  gamma: 0.99
  tau: 0.005
  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: -14       # = -action_dim for lift_pot
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 10000
    sample_window_size: 10000
    min_buffer_size: 0
    auto_save: False

  target_update_freq: 1
  reward_coef: 5.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 1
    max_length: 1
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 32
    auto_reset: True
    ignore_terminations: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 2       # off-policy: few env steps per training step
    reward_coef: ${algorithm.reward_coef}
    group_size: ${algorithm.group_size}
    assets_path: ${oc.env:ROBOTWIN_ASSETS_PATH}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/train_seeds.json
    enable_offload: False
  eval:
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    reward_coef: ${algorithm.reward_coef}
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: ${oc.env:ROBOTWIN_ASSETS_PATH}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    enable_offload: False

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_prev_infos: True
  enable_torch_compile: True
  enable_cuda_graph: False
  model:
    model_type: "mlp_policy"
    model_path: ""
    precision: "32"

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1024
  global_batch_size: 1024
  seed: 1234
  enable_offload: False
  model:
    obs_dim: 21
    action_dim: 14
    hidden_dim: 256
    policy_setup: "panda-qpos"
    num_action_chunks: 1
    precision: "32"
    add_value_head: False
    add_q_head: True
  optim:
    clip_grad: 10.0
    lr: 3.0e-4
    lr_scheduler: torch_constant
  critic_optim:
    clip_grad: 10.0
    lr: 3.0e-4
    lr_scheduler: torch_constant
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    fsdp_size: -1
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: "32"
      reduce_dtype: "32"
      buffer_dtype: "32"

reward:
  use_reward_model: False

critic:
  use_critic_model: False
