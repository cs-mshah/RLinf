# B1: MLP-PPO (from scratch) on RoboTwin lift_pot, default reward.
# Primary hydra config; state obs = proprioception (14) + pot pose (7) = 21 dims.

defaults:
  - env/robotwin_lift_pot_state@env.train
  - env/robotwin_lift_pot_state@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor, env, rollout: 0      # MLP + sapien both fit on one H100

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "b1_mlp_ppo_robotwin"
    logger_backends: ["tensorboard"]
  max_epochs: 200
  max_steps: -1
  only_eval: False
  val_check_interval: 10
  save_interval: 10
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "mean"
  kl_beta: 0.0
  entropy_bonus: 0.01
  clip_ratio_high: 0.1
  clip_ratio_low: 0.1
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95
  reward_coef: 5.0
  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 5.0
  update_epoch: 8
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: -1
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 128
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 32
    reward_coef: ${algorithm.reward_coef}
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    group_size: ${algorithm.group_size}
    assets_path: ${oc.env:ROBOTWIN_ASSETS_PATH}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/train_seeds.json
    enable_offload: False
  eval:
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 200
    reward_coef: ${algorithm.reward_coef}
    max_steps_per_rollout_epoch: 200
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: ${oc.env:ROBOTWIN_ASSETS_PATH}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    enable_offload: False

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_type: "mlp_policy"
    model_path: ""
    precision: "32"

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 64
  seed: 1234
  enable_offload: False
  model:
    obs_dim: 21        # 14 (proprio) + 7 (pot pose)
    action_dim: 14
    hidden_dim: 256
    policy_setup: "panda-qpos"   # reused enum; MLP treats as flat-obs
    num_action_chunks: 1
    add_value_head: True
    precision: "32"
  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    weight_decay: 0.0
    clip_grad: 0.5
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    fsdp_size: -1
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: "32"
      reduce_dtype: "32"
      buffer_dtype: "32"

reward:
  use_reward_model: False

critic:
  use_critic_model: False
