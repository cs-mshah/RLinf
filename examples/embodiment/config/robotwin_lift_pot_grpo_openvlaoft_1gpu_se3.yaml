# M2b: VLA-GRPO on 1 H100 with SE(3)/SO(3) reward wrapper.
# Primary config — same as M1 but env uses the SE(3) reward variant.

defaults:
  - env/robotwin_lift_pot_se3@env.train
  - env/robotwin_lift_pot_se3@env.eval
  - model/openvla_oft@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    # Same 2-GPU split as M1. Colocating actor+rollout on 1 GPU OOM'd; spreading
    # actor to GPU 0 and rollout to GPU 1 kept both under 70 GB/80 GB.
    actor: 0
    env: 0
    rollout: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "m2b_vla_grpo_se3_1gpu"
    logger_backends: ["tensorboard"]
  max_epochs: 50            # matches M1; early-stop on improvement
  max_steps: -1
  only_eval: False
  val_check_interval: 2     # first eval at ~40 min
  save_interval: 2          # save every eval for early-stop recovery
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 4
  rollout_epoch: 4          # halved from 8; faster turnaround
  eval_rollout_epoch: 1
  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level
  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 1.0
  gae_lambda: 0.95
  reward_coef: 5.0
  filter_rewards: True
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5
  sampling_params:
    do_sample: True
    temperature_train: 1.0      # matches M1 after M1's collapse
    temperature_eval: -1
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 32
    reward_coef: ${algorithm.reward_coef}
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    group_size: ${algorithm.group_size}
    assets_path: ${oc.env:ROBOTWIN_ASSETS_PATH}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/train_seeds.json
    enable_offload: True
  eval:
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 200
    reward_coef: ${algorithm.reward_coef}
    max_steps_per_rollout_epoch: 200
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: ${oc.env:ROBOTWIN_ASSETS_PATH}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    enable_offload: True

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1
  model:
    model_type: "openvla_oft"
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 2
  global_batch_size: 32
  seed: 1234
  enable_offload: True
  model:
    model_path: ${oc.env:VLA_CKPT_PATH}
    implement_version: "official"
    model_type: "openvla_oft"
    value_type: ${algorithm.reward_type}
    action_dim: 14
    use_proprio: True
    proprio_dim: 14
    use_film: False
    num_action_chunks: 25
    unnorm_key: lift_pot_1k
    center_crop: True
    is_lora: True
    max_prompt_length: 512
  optim:
    # See M1 config for rationale: sqrt-scaled lr for 32x smaller batch.
    lr: 5.0e-5
    value_lr: 1.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    fsdp_size: -1
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
